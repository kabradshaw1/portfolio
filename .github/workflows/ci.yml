name: CI/CD

on:
  pull_request:
    branches: [qa]
  push:
    branches: [qa, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  grafana-dashboard-sync:
    name: Grafana Dashboard Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify dashboard source JSON and K8s ConfigMap are in sync
        run: |
          python3 - <<'PY'
          import json, yaml, sys
          src = json.load(open('monitoring/grafana/dashboards/system-overview.json'))
          cm = yaml.safe_load(open('k8s/monitoring/configmaps/grafana-dashboards.yml'))
          embedded = json.loads(cm['data']['system-overview.json'])
          if src != embedded:
              print("ERROR: grafana dashboard drift detected", file=sys.stderr)
              print("  monitoring/grafana/dashboards/system-overview.json and", file=sys.stderr)
              print("  k8s/monitoring/configmaps/grafana-dashboards.yml embed different JSON.", file=sys.stderr)
              print("  Regenerate the ConfigMap from the source JSON", file=sys.stderr)
              print("  (see docs/superpowers/plans/2026-04-09-grafana-hardening.md Task 4).", file=sys.stderr)
              sys.exit(1)
          print("grafana dashboards in sync")
          PY

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check services/

      - name: Ruff format check
        run: ruff format --check services/

  python-tests:
    name: Python Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, chat, debug, eval]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: .venv
          key: venv-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service), 'services/shared/pyproject.toml') }}

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install services/shared/
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: services
        run: |
          source .venv/bin/activate
          pytest services/${{ matrix.service }}/tests/ -v \
            --cov=services/${{ matrix.service }}/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.service }}.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: coverage-${{ matrix.service }}.xml

  java-lint:
    name: Java Lint (Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run Checkstyle
        working-directory: java
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

  java-unit-tests:
    name: Java Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - task-service
          - activity-service
          - notification-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run unit tests
        working-directory: java
        run: ./gradlew :${{ matrix.service }}:test --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-report-${{ matrix.service }}
          path: java/${{ matrix.service }}/build/reports/tests/

  java-integration-tests:
    name: Java Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run integration tests
        working-directory: java
        run: ./gradlew integrationTest --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-report-integration
          path: java/task-service/build/reports/tests/

  go-lint:
    name: Go Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, order-service, ai-service, analytics-service, product-service, cart-service, order-projector]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/${{ matrix.service }}/go.mod
      - name: Install golangci-lint
        working-directory: go/${{ matrix.service }}
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run linter
        working-directory: go/${{ matrix.service }}
        run: golangci-lint run ./...

  go-tests:
    name: Go Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, order-service, ai-service, analytics-service, product-service, cart-service, order-projector]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/${{ matrix.service }}/go.mod
      - name: Run tests
        working-directory: go/${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go-${{ matrix.service }}
          path: go/${{ matrix.service }}/coverage.out

  buf-breaking:
    name: Proto Breaking Change Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for proto changes
        id: proto-changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^go/proto/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: bufbuild/buf-setup-action@v1
        if: steps.proto-changes.outputs.changed == 'true'

      - name: Check for breaking changes
        if: steps.proto-changes.outputs.changed == 'true'
        working-directory: go
        run: buf breaking proto --against '../.git#branch=origin/${{ github.base_ref }},subdir=go/proto'

  go-migration-test:
    name: Go Migration Pipeline Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB: taskdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskuser -d taskdb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Intentional: sslmode=disable matches prod exactly. Dropping it here
      # would cause the pq driver to default to sslmode=require and reproduce
      # the 2026-04-08 production deploy failure.
      DATABASE_URL: postgres://taskuser:taskpass@localhost:5432/ecommercedb?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client and golang-migrate
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: Create ecommercedb
        env:
          PGPASSWORD: taskpass
        run: |
          psql -h localhost -U taskuser -d taskdb -c "CREATE DATABASE ecommercedb;"

      - name: Create productdb
        env:
          PGPASSWORD: taskpass
        run: |
          psql -h localhost -U taskuser -d taskdb -c "CREATE DATABASE productdb;"

      - name: Create projectordb
        env:
          PGPASSWORD: taskpass
        run: |
          psql -h localhost -U taskuser -d taskdb -c "CREATE DATABASE projectordb;"

      # Per-service x-migrations-table matches go/k8s/jobs/*.yml exactly.
      # Without this, both services share the default schema_migrations table
      # and whichever runs first claims the version counter, causing the other
      # to skip migrations and fail on table references. See commit 25054f5.
      - name: Run auth-service migrations
        run: |
          migrate -path go/auth-service/migrations -database "${DATABASE_URL}&x-migrations-table=auth_schema_migrations" up

      - name: Run order-service migrations
        run: |
          migrate -path go/order-service/migrations -database "${DATABASE_URL}&x-migrations-table=ecommerce_schema_migrations" up

      - name: Apply order-service seed data
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f go/order-service/seed.sql

      - name: Run product-service migrations
        run: |
          migrate -path go/product-service/migrations -database "postgres://taskuser:taskpass@localhost:5432/productdb?sslmode=disable&x-migrations-table=product_schema_migrations" up

      - name: Apply product seed data
        run: |
          psql "postgres://taskuser:taskpass@localhost:5432/productdb?sslmode=disable" -v ON_ERROR_STOP=1 -f go/product-service/seed.sql

      - name: Verify tables exist
        run: |
          psql "$DATABASE_URL" -c "\dt" | tee /tmp/tables.txt
          grep -q ' users ' /tmp/tables.txt || (echo "users table missing" && exit 1)
          grep -q ' products ' /tmp/tables.txt || (echo "products table missing" && exit 1)
          grep -q ' orders ' /tmp/tables.txt || (echo "orders table missing" && exit 1)

      - name: Run order-projector migrations
        run: |
          migrate -path go/order-projector/migrations -database "postgres://taskuser:taskpass@localhost:5432/projectordb?sslmode=disable&x-migrations-table=projector_schema_migrations" up

      - name: Verify product tables exist
        run: |
          psql "postgres://taskuser:taskpass@localhost:5432/productdb?sslmode=disable" -c "\dt" | tee /tmp/product-tables.txt
          grep -q ' products ' /tmp/product-tables.txt || (echo "products table missing in productdb" && exit 1)

      - name: Verify projector tables exist
        run: |
          psql "postgres://taskuser:taskpass@localhost:5432/projectordb?sslmode=disable" -c "\dt" | tee /tmp/projector-tables.txt
          grep -q ' order_timeline ' /tmp/projector-tables.txt || (echo "order_timeline table missing in projectordb" && exit 1)
          grep -q ' order_summary ' /tmp/projector-tables.txt || (echo "order_summary table missing in projectordb" && exit 1)

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  e2e-mocked:
    name: E2E Staging Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/qa'
    needs: [frontend-checks]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  k8s-manifest-validation:
    name: K8s Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Install yq
        run: |
          sudo curl -L -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      # Stage A: static schema validation (fast fail, <5s).
      # Exclude overlays/ dirs — they contain Kustomize patch fragments,
      # not standalone manifests (e.g. $patch: delete directives).
      - name: Stage A — kubeconform
        run: |
          find k8s/ java/k8s/ go/k8s/ \
            -type f \( -name '*.yml' -o -name '*.yaml' \) \
            -not -path '*/overlays/*' \
            -not -name 'kustomization.yaml' \
            -print0 | xargs -0 kubeconform -strict -summary \
              -schema-location default -ignore-missing-schemas

      # Stage B: spin up a throwaway kind cluster and run server-side dry-run.
      - name: Stage B — kind cluster (create)
        uses: helm/kind-action@v1
        with:
          cluster_name: manifest-validation
          wait: 60s

      - name: Stage B — create namespaces
        run: |
          for ns in ai-services java-tasks go-ecommerce monitoring ai-services-qa java-tasks-qa go-ecommerce-qa; do
            kubectl create namespace "$ns"
          done

      - name: Stage B — server-side dry-run
        run: |
          # Apply every manifest directory recursively. --dry-run=server
          # exercises the real API server's validation and admission.
          # Skip overlays/, kustomization.yaml, and cert-manager/ (CRDs not in kind cluster).
          for dir in k8s java/k8s go/k8s; do
            find "$dir" -type f \( -name '*.yml' -o -name '*.yaml' \) \
              -not -path '*/overlays/*' \
              -not -path '*/cert-manager/*' \
              -not -name 'kustomization.yaml' \
              -print0 | xargs -0 -I{} kubectl apply --dry-run=server -f {}
          done

      # Stage C: portfolio-specific policy rules.
      - name: Stage C — policy check
        run: scripts/k8s-policy-check.sh

  compose-smoke:
    name: Compose Smoke (Python stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (for pulling cached images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty .env (required by docker-compose.yml env_file refs)
        run: touch .env

      - name: Pull pre-built images and start compose stack
        run: |
          # Pull pre-built GHCR images instead of building from source.
          # This skips the ~10 min pip install during docker build.
          # Smoke tests verify service configuration (env vars, routing, health),
          # not the code itself — unit tests cover that.
          REPO="ghcr.io/${{ github.repository }}"
          for svc in ingestion chat debug; do
            docker pull "${REPO}/${svc}:latest"
          done

          # Only start services needed for the Python RAG smoke path.
          # docker-compose.yml also defines nvidia-gpu-exporter and cadvisor,
          # which require a GPU / host access not available on GH runners.
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d \
            qdrant gateway ingestion chat debug mock-ollama

      - name: Wait for gateway to be reachable
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/chat/health >/dev/null 2>&1; then
              echo "gateway ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "gateway did not come up within 60s" >&2
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run smoke-ci Playwright tests
        working-directory: frontend
        run: npx playwright test --config=playwright.smoke-ci.config.ts

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=200

      - name: Tear down compose stack
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  security-bandit:
    name: Security - Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit==1.9.4

      - name: Run Bandit
        run: bandit -r services/ -f json -ll -o bandit-report.json || true

      - name: Check results
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          if results:
              for r in results:
                  print(f\"{r['issue_severity']}: {r['filename']}:{r['line_number']} - {r['issue_text']}\")
              sys.exit(1)
          print('No issues found')
          "
          fi

  security-pip-audit:
    name: Security - pip-audit (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, chat, debug, eval]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: .venv
          key: venv-audit-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service), 'services/shared/pyproject.toml') }}

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install services/shared/
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pip-audit

      # 2026-04-16: CVE-2025-71176 (pytest) — dev-only dep, fix at pytest 9.0.3 which is not yet released
      # 2026-04-16: GHSA-fv5p-p927-qmxr (langchain-text-splitters) — fix at 1.1.2 which is not yet released (latest is 0.3.11)
      # 2026-04-17: ragas 0.2.x transitive deps — all langchain 0.2.x CVEs are unexploitable in our context
      #   (no user-controlled templates, no EverNote/HTML loaders, no langchain serialization, text-only inputs)
      #   Revisit when ragas 0.3.0 stable releases (will pull modern langchain 0.3.x)
      # CVE-2025-45691 (ragas) — file read via image URLs, text-only service not affected
      # CVE-2025-69872 (diskcache) — pickle deser requires local fs access
      # CVE-2025-6984 (langchain-community) — XXE in EverNoteLoader, never used
      # CVE-2025-65106, CVE-2025-68664, CVE-2026-26013, CVE-2026-40087, CVE-2026-34070 (langchain-core)
      #   — template/serialization/path traversal, no untrusted input
      # GHSA-r7w7-9xr2-qq2r (langchain-openai) — DNS rebinding in image token counting, not used
      # CVE-2025-6985 (langchain-text-splitters) — XXE in HTMLSectionSplitter, not used
      # GHSA-rr7j-v2q5-chgv (langsmith) — streaming bypass of output redaction, not used
      - name: Run pip-audit
        run: |
          source .venv/bin/activate
          pip-audit \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln GHSA-fv5p-p927-qmxr \
            --ignore-vuln CVE-2025-45691 \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2025-6984 \
            --ignore-vuln CVE-2025-65106 \
            --ignore-vuln CVE-2025-68664 \
            --ignore-vuln CVE-2026-26013 \
            --ignore-vuln CVE-2026-40087 \
            --ignore-vuln CVE-2026-34070 \
            --ignore-vuln GHSA-r7w7-9xr2-qq2r \
            --ignore-vuln CVE-2025-6985 \
            --ignore-vuln GHSA-rr7j-v2q5-chgv \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln ECHO-ffe1-1d3c-d9bc \
            --ignore-vuln ECHO-7db2-03aa-5591 \
            --ignore-vuln CVE-2026-6587

  security-npm-audit:
    name: Security - npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  security-gitleaks:
    name: Security - Gitleaks (Secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-hadolint:
    name: Security - Hadolint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - services/ingestion/Dockerfile
          - services/chat/Dockerfile
          - services/debug/Dockerfile
          - services/eval/Dockerfile
          - java/task-service/Dockerfile
          - java/activity-service/Dockerfile
          - java/notification-service/Dockerfile
          - java/gateway-service/Dockerfile
          - go/auth-service/Dockerfile
          - go/order-service/Dockerfile
          - go/ai-service/Dockerfile
          - go/analytics-service/Dockerfile
          - go/product-service/Dockerfile
          - go/cart-service/Dockerfile
          - go/payment-service/Dockerfile
          - go/order-projector/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  security-cors-check:
    name: Security - CORS Guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for wildcard CORS
        run: |
          if grep -r 'allow_origins=\["\*"\]' services/; then
            echo "ERROR: Wildcard CORS found in services/. Use ALLOWED_ORIGINS env var instead."
            exit 1
          fi
          echo "CORS check passed — no wildcard origins found."

  # ---------- Build Images ----------

  build-images:
    name: Build Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - python-lint
      - python-tests
      - java-lint
      - java-unit-tests
      - go-lint
      - go-tests
      - frontend-checks
      - security-gitleaks
      - security-hadolint
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - service: ingestion
            context: services
            file: services/ingestion/Dockerfile
            image: ingestion
            paths: services/ingestion services/shared
          - service: chat
            context: services
            file: services/chat/Dockerfile
            image: chat
            paths: services/chat services/shared
          - service: debug
            context: services
            file: services/debug/Dockerfile
            image: debug
            paths: services/debug services/shared
          - service: eval
            context: services
            file: services/eval/Dockerfile
            image: eval
            paths: services/eval services/shared
          - service: java-task-service
            context: java/task-service
            file: java/task-service/Dockerfile
            image: java-task-service
            java-service: task-service
            paths: java/task-service java/build.gradle java/settings.gradle
          - service: java-activity-service
            context: java/activity-service
            file: java/activity-service/Dockerfile
            image: java-activity-service
            java-service: activity-service
            paths: java/activity-service java/build.gradle java/settings.gradle
          - service: java-notification-service
            context: java/notification-service
            file: java/notification-service/Dockerfile
            image: java-notification-service
            java-service: notification-service
            paths: java/notification-service java/build.gradle java/settings.gradle
          - service: java-gateway-service
            context: java/gateway-service
            file: java/gateway-service/Dockerfile
            image: java-gateway-service
            java-service: gateway-service
            paths: java/gateway-service java/build.gradle java/settings.gradle
          - service: go-auth-service
            context: go
            file: go/auth-service/Dockerfile
            image: go-auth-service
            paths: go/auth-service go/pkg go/go.work
          - service: go-order-service
            context: go
            file: go/order-service/Dockerfile
            image: go-order-service
            paths: go/order-service go/product-service go/cart-service go/pkg go/go.work
          - service: go-ai-service
            context: go
            file: go/ai-service/Dockerfile
            image: go-ai-service
            paths: go/ai-service go/pkg go/go.work
          - service: go-analytics-service
            context: go
            file: go/analytics-service/Dockerfile
            image: go-analytics-service
            paths: go/analytics-service go/pkg go/go.work
          - service: go-product-service
            context: go
            file: go/product-service/Dockerfile
            image: go-product-service
            paths: go/product-service go/pkg
          - service: go-cart-service
            context: go
            file: go/cart-service/Dockerfile
            image: go-cart-service
            paths: go/cart-service go/product-service go/pkg go/go.work
          - service: go-payment-service
            context: go
            file: go/payment-service/Dockerfile
            image: go-payment-service
            paths: go/payment-service go/pkg go/go.work
          - service: go-order-projector
            context: go
            file: go/order-projector/Dockerfile
            image: go-order-projector
            paths: go/order-projector go/pkg go/go.work
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Check for changes
        id: changes
        env:
          PATHS: ${{ matrix.paths }}
        run: |
          # Compare against the last successfully deployed image tag.
          # HEAD~1 misses changes from multi-commit pushes — a common cause
          # of "stale image" bugs where code changes land but CI skips the build
          # because only the final commit is diffed.
          # Use HEAD~5 as a wider window to catch recent changes across commits.
          COMPARE_BASE="HEAD~5"
          # Fall back to HEAD~1 if history is too shallow
          git rev-parse --verify "$COMPARE_BASE" >/dev/null 2>&1 || COMPARE_BASE="HEAD~1"
          if git diff --quiet "$COMPARE_BASE" -- $PATHS; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in [$PATHS] since $COMPARE_BASE — skipping build"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in [$PATHS] since $COMPARE_BASE"
          fi

      - name: Set up JDK 21
        if: matrix.java-service && steps.changes.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build JAR
        if: matrix.java-service && steps.changes.outputs.changed == 'true'
        working-directory: java
        run: ./gradlew :${{ matrix.java-service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true' || github.ref == 'refs/heads/qa'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        if: steps.changes.outputs.changed == 'true'
        id: tag
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$REF" = "refs/heads/main" ]; then
            echo "tags=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "$SHA" | cut -c1-7)
            echo "tags=${IMAGE}:qa-${SHORT_SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retag latest when build skipped
        if: steps.changes.outputs.changed == 'false' && github.ref == 'refs/heads/qa'
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          SHA: ${{ github.sha }}
        run: |
          # When the build is skipped, :latest still exists from the last build.
          # The deploy rewrites manifests to qa-<sha>, so we retag :latest so
          # the deploy can find the image under the new tag.
          # If :latest doesn't exist (new service), skip — the next push that
          # touches the service's paths will trigger a full build.
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          if docker pull "${IMAGE}:latest" 2>/dev/null; then
            docker tag "${IMAGE}:latest" "${IMAGE}:qa-${SHORT_SHA}"
            docker push "${IMAGE}:qa-${SHORT_SHA}"
          else
            echo "No existing :latest for ${IMAGE} — skipping retag (new service, needs first build)"
          fi

  # ---------- Deploy QA ----------

  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    needs: [build-images, e2e-mocked]
    if: github.event_name == 'push' && github.ref == 'refs/heads/qa'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy QA via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_QA }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key kyle@100.82.52.82"

          # Create QA databases if not exists
          $SSH "kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"SELECT 1 FROM pg_database WHERE datname='ecommercedb_qa'\" | grep -q 1 || kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"CREATE DATABASE ecommercedb_qa;\""
          $SSH "kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"SELECT 1 FROM pg_database WHERE datname='projectordb_qa'\" | grep -q 1 || kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"CREATE DATABASE projectordb_qa;\""

          # Apply QA Kustomize overlays.
          # Images use :latest tag — all builds push both :qa-<sha> and :latest,
          # so :latest always points to the most recently built image for each service.
          kubectl kustomize k8s/overlays/qa/ | $SSH "kubectl apply -f -"
          kubectl kustomize k8s/overlays/qa-java/ | $SSH "kubectl apply -f -"

          # Seed placeholder go-secrets in QA so go-auth-service can start.
          # The service rejects empty GOOGLE_CLIENT_ID at startup but accepts any
          # non-empty string; QA doesn't run real Google OAuth, so we mirror prod's
          # placeholder values. Idempotent via `create --dry-run | apply`.
          $SSH "kubectl create secret generic go-secrets -n go-ecommerce-qa \
            --from-literal=google-client-id=placeholder \
            --from-literal=google-client-secret=placeholder \
            --from-literal=jwt-secret='dev-secret-key-at-least-32-characters-long' \
            --dry-run=client -o yaml | kubectl apply -f -"

          # Seed Stripe secrets for payment-service in QA.
          $SSH "kubectl create secret generic stripe-secrets -n go-ecommerce-qa \
            --from-literal=STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY \
            --from-literal=STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET \
            --dry-run=client -o yaml | kubectl apply -f -"

          # Install cert-manager and apply certificate resources for QA.
          $SSH "kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml 2>/dev/null || true"
          $SSH "kubectl wait --for=condition=available --timeout=120s deployment/cert-manager -n cert-manager 2>/dev/null || true"
          $SSH "kubectl wait --for=condition=available --timeout=120s deployment/cert-manager-webhook -n cert-manager 2>/dev/null || true"
          cat k8s/cert-manager/cluster-issuer.yml | $SSH "kubectl apply -f -"
          cat k8s/cert-manager/qa-certificates.yml | $SSH "kubectl apply -f -"

          # Apply Go overlay, excluding Jobs (they must run sequentially below).
          # Split multi-doc YAML on '---', drop any document containing 'kind: Job'.
          kubectl kustomize k8s/overlays/qa-go/ \
            | awk 'BEGIN{doc=""} /^---$/{if(doc!="" && doc !~ /kind: Job/)print doc; doc="---\n";next} {doc=doc $0 "\n"} END{if(doc!="" && doc !~ /kind: Job/)print doc}' \
            | $SSH "kubectl apply -f -"

          # Run Go migration jobs sequentially in QA namespace.
          # Jobs are immutable; delete before re-applying so they re-run on every deploy.
          # auth-migrate MUST run before order-migrate: both services share
          # the same Postgres, and order-service's migrations reference users(id)
          # which is created by auth-service's migrations.
          $SSH "kubectl delete job go-auth-migrate go-order-migrate go-product-migrate go-cart-migrate go-payment-migrate go-projector-migrate -n go-ecommerce-qa --ignore-not-found --wait=true"

          # Wait for Postgres to accept connections after restart
          echo "Waiting for Postgres to accept connections..."
          for i in $(seq 1 30); do
            if $SSH "kubectl exec -n java-tasks deploy/postgres -- pg_isready -U taskuser" 2>/dev/null; then
              echo "Postgres ready."
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/auth-service-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-auth-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-auth-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/order-service-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-order-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-order-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          # Restart order-service after its migration so it picks up schema
          # changes with fresh connection pools and a reset circuit breaker
          # before other services start generating saga events.
          $SSH "kubectl rollout restart deployment/go-order-service -n go-ecommerce-qa"
          $SSH "kubectl rollout status deployment/go-order-service -n go-ecommerce-qa --timeout=60s"

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/product-service-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-product-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-product-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/cart-service-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-cart-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-cart-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/payment-service-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-payment-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-payment-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          sed 's/namespace: go-ecommerce$/namespace: go-ecommerce-qa/' go/k8s/jobs/order-projector-migrate.yml | $SSH "kubectl apply -f -"
          if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-projector-migrate -n go-ecommerce-qa"; then
            $SSH "kubectl logs job/go-projector-migrate -n go-ecommerce-qa --tail=200" || true
            exit 1
          fi

          # Restart QA deployments
          $SSH "kubectl rollout restart deployment -n ai-services-qa"
          $SSH "kubectl rollout restart deployment -n java-tasks-qa"
          $SSH "kubectl rollout restart deployment -n go-ecommerce-qa"

          $SSH "kubectl rollout status deployment -n ai-services-qa --timeout=180s"
          $SSH "kubectl rollout status deployment -n java-tasks-qa --timeout=180s"
          $SSH "kubectl rollout status deployment -n go-ecommerce-qa --timeout=180s"

          # Verify monitoring stack health
          echo "Checking monitoring stack health..."
          if ! $SSH "kubectl get pod -n monitoring -l app=jaeger -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Jaeger is not running"
            exit 1
          fi
          if ! $SSH "kubectl get pod -n monitoring -l app=grafana -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Grafana is not running"
            exit 1
          fi
          if ! $SSH "kubectl get pod -n monitoring -l app=promtail -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Promtail is not running"
            exit 1
          fi
          echo "Monitoring stack healthy"

          rm -f ~/.ssh/deploy_key

  # ---------- Deploy Production ----------

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      go: ${{ steps.filter.outputs.go }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'services/**'
            java:
              - 'java/**'
            go:
              - 'go/**'
            k8s:
              - 'k8s/**'
              - 'java/k8s/**'
              - 'go/k8s/**'

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-images
      - security-gitleaks
      - security-hadolint
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Tailscale
        # NOTE: authkey expires every 90 days (free plan). Regenerate at
        # Tailscale admin → Keys and update TAILSCALE_AUTHKEY in GitHub secrets.
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Apply K8s manifests via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PYTHON_CHANGED: ${{ needs.changes.outputs.python }}
          JAVA_CHANGED: ${{ needs.changes.outputs.java }}
          GO_CHANGED: ${{ needs.changes.outputs.go }}
          K8S_CHANGED: ${{ needs.changes.outputs.k8s }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key kyle@100.82.52.82"

          # Always apply namespaces and manifests (cheap, idempotent)
          for f in $(find k8s go/k8s java/k8s -name 'namespace.yml' 2>/dev/null); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find k8s/ai-services -name '*.yml' -not -name 'namespace.yml'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find java/k8s -name '*.yml' -not -name 'namespace.yml' -not -path '*/secrets/*'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find k8s/monitoring -name '*.yml' -not -name 'namespace.yml'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"

          # Seed Stripe secrets for payment-service in prod.
          $SSH "kubectl create secret generic stripe-secrets -n go-ecommerce \
            --from-literal=STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY \
            --from-literal=STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET \
            --dry-run=client -o yaml | kubectl apply -f -"

          # Install cert-manager and apply certificate resources for prod.
          $SSH "kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml 2>/dev/null || true"
          $SSH "kubectl wait --for=condition=available --timeout=120s deployment/cert-manager -n cert-manager 2>/dev/null || true"
          $SSH "kubectl wait --for=condition=available --timeout=120s deployment/cert-manager-webhook -n cert-manager 2>/dev/null || true"
          cat k8s/cert-manager/cluster-issuer.yml | $SSH "kubectl apply -f -"
          cat k8s/cert-manager/ca-certificate.yml | $SSH "kubectl apply -f -"
          cat k8s/cert-manager/issuer.yml | $SSH "kubectl apply -f -"
          cat k8s/cert-manager/certificates.yml | $SSH "kubectl apply -f -"

          for f in $(find go/k8s -name '*.yml' -not -name 'namespace.yml' -not -path '*/secrets/*' -not -path '*/jobs/*'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"

          # Only restart deployments that have new images
          if [ "$PYTHON_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Restarting ai-services..."
            $SSH "kubectl rollout restart deployment -n ai-services"
            $SSH "kubectl rollout status deployment -n ai-services --timeout=180s"
          fi

          if [ "$JAVA_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Restarting java-tasks..."
            $SSH "kubectl rollout restart deployment -n java-tasks"
            $SSH "kubectl rollout status deployment -n java-tasks --timeout=180s"
          fi

          if [ "$GO_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Running Go migration Jobs..."

            # Create projectordb if not exists (new database for CQRS read models)
            $SSH "kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"SELECT 1 FROM pg_database WHERE datname='projectordb'\" | grep -q 1 || kubectl exec deployment/postgres -n java-tasks -- psql -U taskuser -d taskdb -c \"CREATE DATABASE projectordb;\""

            # Jobs are immutable; delete before re-applying so they re-run on every deploy.
            $SSH "kubectl delete job go-auth-migrate go-order-migrate go-product-migrate go-cart-migrate go-payment-migrate go-projector-migrate -n go-ecommerce --ignore-not-found --wait=true"

            # Wait for Postgres to accept connections after restart
            echo "Waiting for Postgres to accept connections..."
            for i in $(seq 1 30); do
              if $SSH "kubectl exec -n java-tasks deploy/postgres -- pg_isready -U taskuser" 2>/dev/null; then
                echo "Postgres ready."
                break
              fi
              echo "  attempt $i/30..."
              sleep 2
            done

            # auth-migrate MUST run before order-migrate: both services share
            # ecommercedb, and the order-service seed inserts into the users table
            # which is created by auth-service's migrations.
            $SSH "kubectl apply -f -" < go/k8s/jobs/auth-service-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-auth-migrate -n go-ecommerce"; then
              echo "go-auth-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-auth-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            $SSH "kubectl apply -f -" < go/k8s/jobs/order-service-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-order-migrate -n go-ecommerce"; then
              echo "go-order-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-order-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            # Restart order-service after its migration so it picks up schema
            # changes with fresh connection pools and a reset circuit breaker
            # before other services start generating saga events.
            $SSH "kubectl rollout restart deployment/go-order-service -n go-ecommerce"
            $SSH "kubectl rollout status deployment/go-order-service -n go-ecommerce --timeout=60s"

            $SSH "kubectl apply -f -" < go/k8s/jobs/product-service-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-product-migrate -n go-ecommerce"; then
              echo "go-product-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-product-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            $SSH "kubectl apply -f -" < go/k8s/jobs/cart-service-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-cart-migrate -n go-ecommerce"; then
              echo "go-cart-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-cart-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            $SSH "kubectl apply -f -" < go/k8s/jobs/payment-service-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-payment-migrate -n go-ecommerce"; then
              echo "go-payment-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-payment-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            $SSH "kubectl apply -f -" < go/k8s/jobs/order-projector-migrate.yml
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-projector-migrate -n go-ecommerce"; then
              echo "go-projector-migrate failed. Logs follow:"
              $SSH "kubectl logs job/go-projector-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            echo "Restarting go-ecommerce deployments..."
            $SSH "kubectl rollout restart deployment -n go-ecommerce"
            $SSH "kubectl rollout status deployment -n go-ecommerce --timeout=180s"
          fi

          # Verify monitoring stack health
          echo "Checking monitoring stack health..."
          if ! $SSH "kubectl get pod -n monitoring -l app=jaeger -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Jaeger is not running"
            exit 1
          fi
          if ! $SSH "kubectl get pod -n monitoring -l app=grafana -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Grafana is not running"
            exit 1
          fi
          if ! $SSH "kubectl get pod -n monitoring -l app=promtail -o jsonpath='{.items[0].status.phase}'" | grep -q Running; then
            echo "::error::Promtail is not running"
            exit 1
          fi
          echo "Monitoring stack healthy"

          rm -f ~/.ssh/deploy_key

  # ---------- Smoke Tests ----------

  smoke-qa:
    name: QA Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-qa]
    if: needs.deploy-qa.result == 'success'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run smoke tests
        env:
          SMOKE_FRONTEND_URL: https://qa.kylebradshaw.dev
          SMOKE_API_URL: https://qa-api.kylebradshaw.dev
          SMOKE_GRAPHQL_URL: https://qa-api.kylebradshaw.dev/graphql
          SMOKE_GO_PASSWORD: ${{ secrets.SMOKE_GO_PASSWORD }}
        run: npx playwright test --config=playwright.smoke.config.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-qa-playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  smoke-prod:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: |
      always() &&
      needs.deploy-prod.result == 'success' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run smoke tests
        env:
          SMOKE_FRONTEND_URL: https://kylebradshaw.dev
          SMOKE_API_URL: https://api.kylebradshaw.dev
          SMOKE_GRAPHQL_URL: https://api.kylebradshaw.dev/graphql
          SMOKE_GO_PASSWORD: ${{ secrets.SMOKE_GO_PASSWORD }}
        run: npx playwright test --config=playwright.smoke.config.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prod-playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
