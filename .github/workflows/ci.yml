name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'services/**'
            java:
              - 'java/**'
            go:
              - 'go/**'
            frontend:
              - 'frontend/**'
            k8s:
              - 'k8s/**'
              - 'java/k8s/**'
              - 'go/k8s/**'

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check services/

      - name: Ruff format check
        run: ruff format --check services/

  backend-tests:
    name: Backend Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    strategy:
      matrix:
        service: [ingestion, chat, debug]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run tests with coverage
        run: >
          pytest services/${{ matrix.service }}/tests/ -v
          --cov=services/${{ matrix.service }}/app
          --cov-report=term-missing
          --cov-report=xml:coverage-${{ matrix.service }}.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: coverage-${{ matrix.service }}.xml

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.java == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    permissions:
      packages: write
    strategy:
      matrix:
        service: [ingestion, chat, debug]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  java-lint:
    name: Java Lint (Checkstyle)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.java == 'true'
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

  java-unit-tests:
    name: Java Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.java == 'true'
    defaults:
      run:
        working-directory: java
    strategy:
      matrix:
        service:
          - task-service
          - activity-service
          - notification-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run unit tests
        run: ./gradlew :${{ matrix.service }}:test --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-report-${{ matrix.service }}
          path: java/${{ matrix.service }}/build/reports/tests/

  java-docker-build:
    name: Java Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes, java-lint, java-unit-tests]
    if: needs.changes.outputs.java == 'true'
    permissions:
      packages: write
    defaults:
      run:
        working-directory: java
    strategy:
      matrix:
        service:
          - task-service
          - activity-service
          - notification-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build JAR
        run: ./gradlew :${{ matrix.service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: java/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/java-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  go-docker-build:
    name: Go Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    permissions:
      packages: write
    strategy:
      matrix:
        service: [auth-service, ecommerce-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: go/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/go-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-bandit:
    name: Security - Bandit (Python SAST)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit==1.9.4

      - name: Run Bandit
        run: bandit -r services/ -f json -ll -o bandit-report.json || true

      - name: Check results
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          if results:
              for r in results:
                  print(f\"{r['issue_severity']}: {r['filename']}:{r['line_number']} - {r['issue_text']}\")
              sys.exit(1)
          print('No issues found')
          "
          fi

  security-pip-audit:
    name: Security - pip-audit (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    strategy:
      matrix:
        service: [ingestion, chat, debug]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: >
          pip-audit
          --ignore-vuln CVE-2025-6984
          --ignore-vuln CVE-2025-65106
          --ignore-vuln CVE-2025-68664
          --ignore-vuln CVE-2026-26013
          --ignore-vuln CVE-2025-6985

  security-npm-audit:
    name: Security - npm audit
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  security-gitleaks:
    name: Security - Gitleaks (Secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-hadolint:
    name: Security - Hadolint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - services/ingestion/Dockerfile
          - services/chat/Dockerfile
          - services/debug/Dockerfile
          - java/task-service/Dockerfile
          - java/activity-service/Dockerfile
          - java/notification-service/Dockerfile
          - java/gateway-service/Dockerfile
          - go/auth-service/Dockerfile
          - go/ecommerce-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  security-cors-check:
    name: Security - CORS Guardrail
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check for wildcard CORS
        run: |
          if grep -r 'allow_origins=\["\*"\]' services/; then
            echo "ERROR: Wildcard CORS found in services/. Use ALLOWED_ORIGINS env var instead."
            exit 1
          fi
          echo "CORS check passed — no wildcard origins found."

  e2e-staging:
    name: E2E Tests (Staging)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    needs: [frontend-checks]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - changes
      - docker-build
      - java-docker-build
      - go-docker-build
      - security-gitleaks
      - security-hadolint
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Tailscale
        # NOTE: authkey expires every 90 days (free plan). Regenerate at
        # Tailscale admin → Keys and update TAILSCALE_AUTHKEY in GitHub secrets.
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Apply K8s manifests via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PYTHON_CHANGED: ${{ needs.changes.outputs.python }}
          JAVA_CHANGED: ${{ needs.changes.outputs.java }}
          GO_CHANGED: ${{ needs.changes.outputs.go }}
          K8S_CHANGED: ${{ needs.changes.outputs.k8s }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key PC@100.79.113.84"

          # Always apply namespaces and manifests (cheap, idempotent)
          for f in $(find k8s go/k8s java/k8s -name 'namespace.yml' 2>/dev/null); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find k8s/ai-services -name '*.yml' -not -name 'namespace.yml'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find java/k8s -name '*.yml' -not -name 'namespace.yml' -not -path '*/secrets/*'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find k8s/monitoring -name '*.yml' -not -name 'namespace.yml'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"
          for f in $(find go/k8s -name '*.yml' -not -name 'namespace.yml' -not -path '*/secrets/*' -not -path '*/jobs/*'); do echo '---'; cat "$f"; done | $SSH "kubectl apply -f -"

          # Only restart deployments that have new images
          if [ "$PYTHON_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Restarting ai-services..."
            $SSH "kubectl rollout restart deployment -n ai-services"
            $SSH "kubectl rollout status deployment -n ai-services --timeout=180s"
          fi

          if [ "$JAVA_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Restarting java-tasks..."
            $SSH "kubectl rollout restart deployment -n java-tasks"
            $SSH "kubectl rollout status deployment -n java-tasks --timeout=180s"
          fi

          if [ "$GO_CHANGED" = "true" ] || [ "$K8S_CHANGED" = "true" ]; then
            echo "Running Go migration Jobs..."
            # Jobs are immutable; delete before re-applying so they re-run on every deploy.
            $SSH "kubectl delete job go-auth-migrate go-ecommerce-migrate -n go-ecommerce --ignore-not-found --wait=true"
            $SSH "kubectl apply -f -" < go/k8s/jobs/auth-service-migrate.yml
            $SSH "kubectl apply -f -" < go/k8s/jobs/ecommerce-service-migrate.yml

            # Wait for both Jobs to complete. Timeout is intentionally longer than
            # the Jobs' own activeDeadlineSeconds (120s) so a Job that hits its own
            # deadline surfaces as a Job failure with logs, not as a racing
            # kubectl-wait timeout. If either fails, dump logs and fail the deploy.
            if ! $SSH "kubectl wait --for=condition=complete --timeout=180s job/go-auth-migrate job/go-ecommerce-migrate -n go-ecommerce"; then
              echo "Migration Job failed. Logs follow:"
              $SSH "kubectl logs job/go-auth-migrate -n go-ecommerce --tail=200" || true
              $SSH "kubectl logs job/go-ecommerce-migrate -n go-ecommerce --tail=200" || true
              exit 1
            fi

            echo "Restarting go-ecommerce deployments..."
            $SSH "kubectl rollout restart deployment -n go-ecommerce"
            $SSH "kubectl rollout status deployment -n go-ecommerce --timeout=180s"
          fi

          rm -f ~/.ssh/deploy_key

  smoke-production:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run smoke tests
        env:
          SMOKE_FRONTEND_URL: https://kylebradshaw.dev
          SMOKE_API_URL: https://api.kylebradshaw.dev
          SMOKE_GRAPHQL_URL: https://api.kylebradshaw.dev/graphql
          SMOKE_GO_PASSWORD: ${{ secrets.SMOKE_GO_PASSWORD }}
        run: npx playwright test e2e/smoke.spec.ts --config=playwright.smoke.config.ts
