name: Go CI

on:
  push:
    branches: ["**"]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "go/**"

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, ecommerce-service, ai-service]
    defaults:
      run:
        working-directory: go/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/${{ matrix.service }}/go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run linter
        run: golangci-lint run ./...

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, ecommerce-service, ai-service]
    defaults:
      run:
        working-directory: go/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/${{ matrix.service }}/go.mod
      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go-${{ matrix.service }}
          path: go/${{ matrix.service }}/coverage.out

  build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      packages: write
    strategy:
      matrix:
        service: [auth-service, ecommerce-service, ai-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: go/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/go-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
