repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^services/
      - id: ruff-format
        files: ^services/
  - repo: local
    hooks:
      - id: java-checkstyle
        name: Java Checkstyle
        entry: bash -c 'export JAVA_HOME=/opt/homebrew/opt/openjdk/libexec/openjdk.jdk/Contents/Home && export PATH="$JAVA_HOME/bin:$PATH" && java/gradlew -p java checkstyleMain checkstyleTest --no-daemon'
        language: system
        files: ^java/.*\.java$
        pass_filenames: false
