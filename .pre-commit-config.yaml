repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-ll"]
        files: ^services/.*\.py$
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: (^|/)Dockerfile(\..+)?$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^services/
      - id: ruff-format
        files: ^services/
  - repo: local
    hooks:
      - id: java-checkstyle
        name: Java Checkstyle
        entry: bash -c 'export JAVA_HOME=/opt/homebrew/opt/openjdk/libexec/openjdk.jdk/Contents/Home && export PATH="$JAVA_HOME/bin:$PATH" && java/gradlew -p java checkstyleMain checkstyleTest --no-daemon'
        language: system
        files: ^java/.*\.java$
        pass_filenames: false
      - id: frontend-typecheck
        name: Frontend Type Check
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
      - id: frontend-lint
        name: Frontend Lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: frontend-build
        name: Frontend Build (next build)
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-push]
      - id: go-lint
        name: Go Lint (all services)
        entry: bash -c 'set -e; for svc in auth-service order-service ai-service analytics-service product-service cart-service payment-service order-projector; do echo "--- $svc ---"; (cd "go/$svc" && ~/go/bin/golangci-lint run ./...); done'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false
