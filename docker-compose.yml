services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingestion
      - chat
      - debug
      - eval
    restart: unless-stopped

  ingestion:
    image: ghcr.io/kabradshaw1/portfolio/ingestion:latest
    build:
      context: ./services
      dockerfile: ingestion/Dockerfile
      cache_from:
        - ghcr.io/kabradshaw1/portfolio/ingestion:latest
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chat:
    image: ghcr.io/kabradshaw1/portfolio/chat:latest
    build:
      context: ./services
      dockerfile: chat/Dockerfile
      cache_from:
        - ghcr.io/kabradshaw1/portfolio/chat:latest
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  debug:
    image: ghcr.io/kabradshaw1/portfolio/debug:latest
    build:
      context: ./services
      dockerfile: debug/Dockerfile
      cache_from:
        - ghcr.io/kabradshaw1/portfolio/debug:latest
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  eval:
    image: ghcr.io/kabradshaw1/portfolio/eval:latest
    build:
      context: ./services
      dockerfile: eval/Dockerfile
    env_file: .env
    volumes:
      - eval_data:/app/data
    depends_on:
      chat:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      # Anonymous access is dev-only — disabled in K8s production via ConfigMap
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=https://grafana.kylebradshaw.dev
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
    privileged: true
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    ports:
      - "127.0.0.1:9835:9835"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qdrant_data:
  eval_data:
  prometheus_data:
  grafana_data:
