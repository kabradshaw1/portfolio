apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
  namespace: go-ecommerce
data:
  KAFKA_BROKERS: "kafka.go-ecommerce.svc.cluster.local:9092"
  PORT: "8094"
  ALLOWED_ORIGINS: "http://localhost:3000,https://kylebradshaw.dev"
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger.monitoring.svc.cluster.local:4317"
  REDIS_URL: "redis://redis.java-tasks.svc.cluster.local:6379/0"
  WINDOW_FLUSH_INTERVAL: "30s"
  REVENUE_WINDOW_SIZE: "1h"
  TRENDING_WINDOW_SIZE: "15m"
  TRENDING_SLIDE_INTERVAL: "1m"
  ABANDONMENT_WINDOW_SIZE: "30m"
  LATE_EVENT_GRACE: "5m"
