apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-service-config
  namespace: go-ecommerce
data:
  # DSN component split (Phase 4 of the secrets-management migration).
  # The app reads these DB_* keys plus DB_USER/DB_PASSWORD from the
  # cart-service-db SealedSecret and assembles the postgres:// DSN at startup.
  # It reads MQ_* keys plus MQ_USER/MQ_PASSWORD from cart-service-mq for AMQP.
  # The migration Job uses the *_DIRECT variants to bypass PgBouncer.
  DB_HOST: "pgbouncer.java-tasks.svc.cluster.local"
  DB_PORT: "6432"
  DB_NAME: "cartdb"
  DB_OPTIONS: "sslmode=disable&application_name=cart-service"
  DB_HOST_DIRECT: "postgres.java-tasks.svc.cluster.local"
  DB_PORT_DIRECT: "5432"
  DB_OPTIONS_DIRECT: "sslmode=disable&application_name=cart-service-migrate"
  REDIS_URL: redis://redis.java-tasks.svc.cluster.local:6379
  KAFKA_BROKERS: "kafka.go-ecommerce.svc.cluster.local:9092"
  PRODUCT_GRPC_ADDR: "go-product-service.go-ecommerce.svc.cluster.local:9095"
  MQ_HOST: "rabbitmq.java-tasks.svc.cluster.local"
  MQ_PORT: "5672"
  MQ_VHOST: ""
  ALLOWED_ORIGINS: http://localhost:3000,https://kylebradshaw.dev
  PORT: "8096"
  GRPC_PORT: "9096"
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger.monitoring.svc.cluster.local:4317"
  AUTH_GRPC_URL: go-auth-service.go-ecommerce.svc.cluster.local:9091
  TLS_CERT_DIR: /etc/tls
