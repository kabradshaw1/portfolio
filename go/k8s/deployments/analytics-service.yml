apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-analytics-service
  namespace: go-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-analytics-service
  template:
    metadata:
      labels:
        app: go-analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8094"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 20
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: go-analytics-service
          image: ghcr.io/kabradshaw1/portfolio/go-analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8094
          envFrom:
            - configMapRef:
                name: analytics-service-config
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 15
            periodSeconds: 30
