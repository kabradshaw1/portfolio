apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-auth-service
  namespace: go-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-auth-service
  template:
    metadata:
      labels:
        app: go-auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: go-auth-service
          image: ghcr.io/kabradshaw1/portfolio/go-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: go-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
