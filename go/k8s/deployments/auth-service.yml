apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-auth-service
  namespace: go-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-auth-service
  template:
    metadata:
      labels:
        app: go-auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 20
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: grpc-tls
          secret:
            secretName: auth-grpc-tls
      containers:
        - name: go-auth-service
          image: ghcr.io/kabradshaw1/portfolio/go-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
              name: http
            - containerPort: 9091
              name: grpc
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: go-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: go-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: go-secrets
                  key: google-client-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: grpc-tls
              mountPath: /etc/tls
              readOnly: true
