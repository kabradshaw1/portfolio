apiVersion: batch/v1
kind: Job
metadata:
  name: go-order-migrate
  namespace: go-ecommerce
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: migrate-and-seed
          image: ghcr.io/kabradshaw1/portfolio/go-order-service:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Running migrations..."
              /usr/local/bin/migrate -path=/migrations -database="${DATABASE_URL}&x-migrations-table=ecommerce_schema_migrations" up
              echo "Applying seed data..."
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /seed.sql
              echo "Done."
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: order-service-config
                  key: DATABASE_URL_DIRECT
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
