apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: java-tasks
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          lifecycle:
            preStop:
              exec:
                command: ["gosu", "postgres", "pg_ctl", "stop", "-m", "fast", "-D", "/var/lib/postgresql/data"]
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: POSTGRES_DB
              value: taskdb
            - name: POSTGRES_USER
              value: taskuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_USER
              value: taskuser
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
            - name: DATA_SOURCE_URI
              value: "localhost:5432/taskdb?sslmode=disable"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
