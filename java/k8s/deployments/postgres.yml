apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: java-tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: taskdb
            - name: POSTGRES_USER
              value: taskuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
