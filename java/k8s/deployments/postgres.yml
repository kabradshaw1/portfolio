apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: java-tasks
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          args:
            - "-c"
            - "shared_preload_libraries=pg_stat_statements,auto_explain"
            - "-c"
            - "pg_stat_statements.max=5000"
            - "-c"
            - "pg_stat_statements.track=top"
            - "-c"
            - "pg_stat_statements.track_utility=off"
            - "-c"
            - "auto_explain.log_min_duration=500ms"
            - "-c"
            - "auto_explain.log_analyze=true"
            - "-c"
            - "auto_explain.log_buffers=true"
            - "-c"
            - "auto_explain.log_timing=true"
            - "-c"
            - "auto_explain.log_format=json"
            - "-c"
            - "auto_explain.sample_rate=1.0"
            - "-c"
            - "archive_mode=on"
            - "-c"
            - "archive_command=/usr/local/bin/pg-archive-wal.sh %p %f"
            - "-c"
            - "archive_timeout=300"
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
            - "-c"
            - "max_slot_wal_keep_size=4GB"
            - "-c"
            - "hot_standby=on"
          lifecycle:
            preStop:
              exec:
                command: ["gosu", "postgres", "pg_ctl", "stop", "-m", "fast", "-D", "/var/lib/postgresql/data"]
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: POSTGRES_DB
              value: taskdb
            - name: POSTGRES_USER
              value: taskuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: wal-scripts
              mountPath: /usr/local/bin/pg-archive-wal.sh
              subPath: pg-archive-wal.sh
              readOnly: true
            - name: wal-archive
              mountPath: /var/lib/postgresql/wal-archive
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_USER
              value: taskuser
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
            - name: DATA_SOURCE_URI
              value: "localhost:5432/taskdb?sslmode=disable"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yml
          volumeMounts:
            - name: exporter-queries
              mountPath: /etc/postgres-exporter/queries.yml
              subPath: queries.yml
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: exporter-queries
          configMap:
            name: postgres-exporter-queries
        - name: wal-scripts
          configMap:
            name: postgres-wal-scripts
            defaultMode: 0755
        - name: wal-archive
          persistentVolumeClaim:
            claimName: postgres-wal-archive
