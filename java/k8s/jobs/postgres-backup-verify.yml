apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup-verify
  namespace: java-tasks
spec:
  schedule: "0 4 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pg-verify
              image: postgres:17-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  apk add --no-cache curl >/dev/null
                  chown -R postgres:postgres /var/lib/postgresql/data
                  exec gosu postgres /scripts/pg-verify-backups.sh
              env:
                - name: PUSHGATEWAY_URL
                  value: "http://pushgateway.monitoring.svc.cluster.local:9091"
                - name: VERIFY_DBS
                  value: "authdb productdb orderdb cartdb paymentdb ecommercedb projectordb"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: backups
                  mountPath: /backups/postgres
                  readOnly: true
                - name: pgdata
                  mountPath: /var/lib/postgresql/data
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                  ephemeral-storage: "5Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
                  ephemeral-storage: "5Gi"
          volumes:
            - name: scripts
              configMap:
                name: postgres-verify-scripts
                defaultMode: 0555
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backup-readonly
                readOnly: true
            - name: pgdata
              emptyDir:
                sizeLimit: 5Gi
            - name: tmp
              emptyDir: {}
