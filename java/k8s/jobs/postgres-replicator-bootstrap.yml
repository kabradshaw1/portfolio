apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-replicator-bootstrap
  namespace: java-tasks
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:17-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: postgres-password
            - name: REPLICATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-secrets
                  key: replicator-password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # psql variable substitution (:'pw') doesn't work inside DO blocks,
              # so branch in shell and use top-level CREATE/ALTER statements.
              PSQL="psql -h postgres.java-tasks.svc.cluster.local -U taskuser -d postgres"
              EXISTS=$($PSQL -tAc "SELECT 1 FROM pg_roles WHERE rolname='replicator'")
              if [ "$EXISTS" = "1" ]; then
                $PSQL -v ON_ERROR_STOP=1 -v repl_pw="$REPLICATOR_PASSWORD" <<'SQL'
              ALTER ROLE replicator WITH REPLICATION LOGIN PASSWORD :'repl_pw';
              SQL
              else
                $PSQL -v ON_ERROR_STOP=1 -v repl_pw="$REPLICATOR_PASSWORD" <<'SQL'
              CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD :'repl_pw';
              SQL
              fi
              echo "replicator role ready"
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
