server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/taskdb
    username: ${POSTGRES_USER:taskuser}
    password: ${POSTGRES_PASSWORD:taskpass}
    hikari:
      maximum-pool-size: 5        # (core_count * 2) + spindle_count; single-core K8s pod + SSD
      minimum-idle: 2
      connection-timeout: 10000   # 10s — fail fast rather than queue indefinitely
      idle-timeout: 300000        # 5min — release idle connections to free DB resources
      max-lifetime: 1200000       # 20min — rotate before PostgreSQL's default timeout
      leak-detection-threshold: 30000  # 30s — warn if a connection is held too long
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cache:
    type: redis

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long}
    access-token-ttl-ms: 900000
    refresh-token-ttl-ms: 604800000
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-url: https://oauth2.googleapis.com/token
    userinfo-url: https://www.googleapis.com/oauth2/v3/userinfo
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  resend:
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
