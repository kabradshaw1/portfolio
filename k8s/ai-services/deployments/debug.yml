apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug
  template:
    metadata:
      labels:
        app: debug
    spec:
      containers:
        - name: debug
          image: ghcr.io/kabradshaw1/gen_ai_engineer/debug:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: debug-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
