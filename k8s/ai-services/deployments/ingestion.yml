apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ingestion
          image: ghcr.io/kabradshaw1/portfolio/ingestion:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ingestion-config
          volumeMounts:
            # Hosts the per-collection metadata SQLite store.
            - name: ingestion-data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: ingestion-data
          emptyDir: {}
