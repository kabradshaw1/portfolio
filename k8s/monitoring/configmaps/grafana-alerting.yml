apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  alerting.yml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: telegram
        receivers:
          - uid: telegram-default
            type: telegram
            settings:
              bottoken: "$__env{TELEGRAM_BOT_TOKEN}"
              chatid: "8710936679"
            disableResolveMessage: false

    policies:
      - orgId: 1
        receiver: telegram
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

    groups:
      - orgId: 1
        name: Infrastructure
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: gpu-exporter-down
            title: GPU Exporter Down
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: up{job="nvidia-gpu"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params:
                          - 1
                  refId: C
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "GPU exporter is unreachable — NVIDIA GPU may be down or driver unloaded"

          - uid: ai-service-not-ready
            title: AI Service Not Ready
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: kube_pod_status_ready{pod=~"go-ai-service.*", condition="true"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params:
                          - 1
                  refId: C
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "go-ai-service pod is not ready — shopping assistant is down"

          - uid: gpu-temperature-high
            title: GPU Temperature High
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: nvidia_smi_temperature_gpu
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 85
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "GPU temperature is above 85°C"

          - uid: gpu-vram-high
            title: GPU VRAM Usage High
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0.9
                  refId: C
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "GPU VRAM usage is above 90%"

      - orgId: 1
        name: Kubernetes Health
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: container-oom-killed
            title: Container OOM Killed
            noDataState: OK
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: kube_pod_container_status_terminated_reason{reason="OOMKilled"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOM killed"

          - uid: pod-restart-storm
            title: Pod Restart Storm
            noDataState: OK
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: increase(kube_pod_container_status_restarts_total[30m])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 3
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} has restarted more than 3 times in 30 minutes"

          - uid: container-memory-high
            title: Container Memory High
            noDataState: OK
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    max by (pod, container, namespace) (
                      container_memory_working_set_bytes{container!=""}
                      / on(pod, container, namespace)
                      kube_pod_container_resource_limits{resource="memory"}
                    )
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0.85
                  refId: C
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is using >85% of memory limit"

          - uid: node-memory-pressure
            title: Node Memory Pressure
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: kube_node_status_condition{condition="MemoryPressure",status="true"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is under memory pressure"

          - uid: node-disk-pressure
            title: Node Disk Pressure
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
