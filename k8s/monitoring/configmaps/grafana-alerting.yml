                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOM killed"

          - uid: pod-restart-storm
            title: Pod Restart Storm
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: increase(kube_pod_container_status_restarts_total[30m])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 1800
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 3
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} has restarted more than 3 times in 30 minutes"

          - uid: container-memory-high
            title: Container Memory High
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    max by (pod, container, namespace) (
                      container_memory_working_set_bytes{container!=""}
                      / on(pod, container, namespace)
                      kube_pod_container_resource_limits{resource="memory"}
                    )
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0.85
                  refId: C
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is using >85% of memory limit"

          - uid: node-memory-pressure
            title: Node Memory Pressure
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: kube_node_status_condition{condition="MemoryPressure",status="true"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is under memory pressure"

          - uid: node-disk-pressure
            title: Node Disk Pressure
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
