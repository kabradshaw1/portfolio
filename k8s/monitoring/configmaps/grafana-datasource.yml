apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
        uid: PBFA97CFB590B2093
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false
        uid: loki
        jsonData:
          derivedFields:
            - datasourceUid: jaeger
              matcherRegex: '"traceID":"([a-f0-9]+)"'
              name: TraceID
              url: "$${__value.raw}"
              urlDisplayLabel: View Trace
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.monitoring.svc.cluster.local:16686
        editable: false
        uid: jaeger
      - name: postgres-productdb
        type: postgres
        access: proxy
        url: postgres.java-tasks.svc.cluster.local:5432
        user: grafana_reader
        editable: false
        uid: postgres-productdb
        jsonData:
          database: productdb
          sslmode: disable
          postgresVersion: 1700
          timescaledb: false
        secureJsonData:
          password: "$__env{GRAFANA_READER_PASSWORD}"

      - name: postgres-orderdb
        type: postgres
        access: proxy
        url: postgres.java-tasks.svc.cluster.local:5432
        user: grafana_reader
        editable: false
        uid: postgres-orderdb
        jsonData:
          database: orderdb
          sslmode: disable
          postgresVersion: 1700
          timescaledb: false
        secureJsonData:
          password: "$__env{GRAFANA_READER_PASSWORD}"

      - name: postgres-paymentdb
        type: postgres
        access: proxy
        url: postgres.java-tasks.svc.cluster.local:5432
        user: grafana_reader
        editable: false
        uid: postgres-paymentdb
        jsonData:
          database: paymentdb
          sslmode: disable
          postgresVersion: 1700
          timescaledb: false
        secureJsonData:
          password: "$__env{GRAFANA_READER_PASSWORD}"
