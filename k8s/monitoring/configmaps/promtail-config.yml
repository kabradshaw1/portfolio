apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                msg: msg
                traceID: traceID
          - json:
              expressions:
                trace_id: trace_id
          - template:
              source: traceID
              template: '{{ if .trace_id }}{{ .trace_id }}{{ else }}{{ .traceID }}{{ end }}'
          - labels:
              level:
          - output:
              source: msg
          - regex:
              expression: '/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*'
              source: filename
          - labels:
              namespace:
              pod:
              container:
          - template:
              source: app
              template: '{{ .container }}'
          - labels:
              app:
          - match:
              selector: '{app="postgres"}'
              stages:
                - regex:
                    expression: 'duration: (?P<duration_ms>[0-9.]+) ms.*\bplan:\s*(?P<plan_json>\{.*\})'
                - json:
                    source: plan_json
                    expressions:
                      database: '"Database"'
                      query_id: '"Query Identifier"'
                - labels:
                    database:
                - structured_metadata:
                    duration_ms:
                    query_id:
