# Patch all AI service ConfigMaps to use API-based LLM providers on AWS
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
  namespace: ai-services
data:
  LLM_PROVIDER: openai
  LLM_BASE_URL: https://api.groq.com/openai/v1
  LLM_MODEL: llama-3.1-70b-versatile
  EMBEDDING_PROVIDER: openai
  EMBEDDING_BASE_URL: https://api.openai.com/v1
  EMBEDDING_MODEL: text-embedding-3-small
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debug-config
  namespace: ai-services
data:
  LLM_PROVIDER: openai
  LLM_BASE_URL: https://api.groq.com/openai/v1
  LLM_MODEL: llama-3.1-70b-versatile
  EMBEDDING_PROVIDER: openai
  EMBEDDING_BASE_URL: https://api.openai.com/v1
  EMBEDDING_MODEL: text-embedding-3-small
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: ai-services
data:
  EMBEDDING_PROVIDER: openai
  EMBEDDING_BASE_URL: https://api.openai.com/v1
  EMBEDDING_MODEL: text-embedding-3-small
