apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../go/k8s

namespace: go-ecommerce-qa

patches:
  # --- CORS + QA database ---
  - target:
      kind: ConfigMap
      name: auth-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      # Temporarily routed direct to postgres while pgbouncer is rolled out
      # to prod (see PR #182 follow-up). QA's pgbouncer Service is an
      # ExternalName at pgbouncer.java-tasks.svc.cluster.local, which does
      # not yet resolve.
      - op: replace
        path: /data/DATABASE_URL
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/authdb_qa?sslmode=disable&application_name=auth-service"
      - op: add
        path: /data/DATABASE_URL_DIRECT
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/authdb_qa?sslmode=disable&application_name=auth-service-migrate"
      - op: add
        path: /data/GRPC_PORT
        value: "9091"
      - op: add
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
  - target:
      kind: ConfigMap
      name: order-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/DATABASE_URL
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/orderdb_qa?sslmode=disable&application_name=order-service"
      - op: add
        path: /data/DATABASE_URL_DIRECT
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/orderdb_qa?sslmode=disable&application_name=order-service-migrate"
      - op: replace
        path: /data/DATABASE_URL_REPLICA
        value: "postgres://taskuser:taskpass@postgres-replica.java-tasks.svc.cluster.local:5432/orderdb_qa?sslmode=disable"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
      - op: replace
        path: /data/RABBITMQ_URL
        value: "amqp://guest:guest@rabbitmq.java-tasks.svc.cluster.local:5672/qa"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
      - op: add
        path: /data/CART_GRPC_ADDR
        value: "go-cart-service.go-ecommerce-qa.svc.cluster.local:9096"
      - op: replace
        path: /data/PRODUCT_GRPC_ADDR
        value: "go-product-service.go-ecommerce-qa.svc.cluster.local:9095"
      - op: add
        path: /data/AUTH_GRPC_URL
        value: "go-auth-service.go-ecommerce-qa.svc.cluster.local:9091"
      - op: add
        path: /data/PAYMENT_GRPC_ADDR
        value: "go-payment-service.go-ecommerce-qa.svc.cluster.local:9098"
      - op: add
        path: /data/FRONTEND_URL
        value: "https://qa.kylebradshaw.dev"
  - target:
      kind: ConfigMap
      name: ai-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/OLLAMA_URL
        value: "http://ollama.ai-services.svc.cluster.local:11434"
      - op: replace
        path: /data/ORDER_URL
        value: "http://go-order-service:8092"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
      - op: replace
        path: /data/PRODUCT_SERVICE_URL
        value: "http://go-product-service.go-ecommerce-qa.svc.cluster.local:8095"
  - target:
      kind: ConfigMap
      name: analytics-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
      - op: add
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
  # --- Kafka: fix advertised listeners for QA namespace ---
  - target:
      kind: StatefulSet
      name: kafka
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "PLAINTEXT://kafka.go-ecommerce-qa.svc.cluster.local:9092"
  # --- Ingress: QA host ---
  - target:
      kind: Ingress
      name: go-ecommerce-ingress
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: "qa-api.kylebradshaw.dev"
  - target:
      kind: ConfigMap
      name: product-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/DATABASE_URL
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/productdb_qa?sslmode=disable&application_name=product-service"
      - op: add
        path: /data/DATABASE_URL_DIRECT
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/productdb_qa?sslmode=disable&application_name=product-service-migrate"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
  - target:
      kind: ConfigMap
      name: cart-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/DATABASE_URL
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/cartdb_qa?sslmode=disable&application_name=cart-service"
      - op: add
        path: /data/DATABASE_URL_DIRECT
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/cartdb_qa?sslmode=disable&application_name=cart-service-migrate"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://redis.java-tasks.svc.cluster.local:6379/1"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
      - op: replace
        path: /data/PRODUCT_GRPC_ADDR
        value: "go-product-service.go-ecommerce-qa.svc.cluster.local:9095"
      - op: replace
        path: /data/RABBITMQ_URL
        value: "amqp://guest:guest@rabbitmq.java-tasks.svc.cluster.local:5672/qa"
      - op: add
        path: /data/AUTH_GRPC_URL
        value: "go-auth-service.go-ecommerce-qa.svc.cluster.local:9091"
  - target:
      kind: ConfigMap
      name: payment-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/DATABASE_URL
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/paymentdb_qa?sslmode=disable&application_name=payment-service"
      - op: add
        path: /data/DATABASE_URL_DIRECT
        value: "postgres://taskuser:taskpass@postgres.java-tasks.svc.cluster.local:5432/paymentdb_qa?sslmode=disable&application_name=payment-service-migrate"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
      - op: replace
        path: /data/RABBITMQ_URL
        value: "amqp://guest:guest@rabbitmq.java-tasks.svc.cluster.local:5672/qa"
  - target:
      kind: ConfigMap
      name: order-projector-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      # DSN component split (Phase 4): host/port/options are shared with prod
      # (same Postgres reached by ExternalName), so QA only overrides the
      # database name. DB_USER/DB_PASSWORD come from the go-ecommerce-qa
      # namespace's order-projector-db SealedSecret.
      - op: replace
        path: /data/DB_NAME
        value: "projectordb_qa"
      - op: replace
        path: /data/KAFKA_BROKERS
        value: "kafka.go-ecommerce-qa.svc.cluster.local:9092"
  # --- Migration jobs ---
  # No Job patches needed: migration jobs read DATABASE_URL via configMapKeyRef
  # from their respective ConfigMaps above. The patches already repoint
  # DATABASE_URL to *_qa databases, so jobs inherit QA connection strings.
