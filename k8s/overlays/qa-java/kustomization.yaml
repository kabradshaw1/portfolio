apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../java/k8s

namespace: java-tasks-qa

patches:
  # --- CORS ---
  - target:
      kind: ConfigMap
      name: gateway-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/REDIS_HOST
        value: "redis.java-tasks.svc.cluster.local"
  - target:
      kind: ConfigMap
      name: task-service-config
    patch: |
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://qa.kylebradshaw.dev,http://localhost:3000"
      - op: replace
        path: /data/POSTGRES_HOST
        value: "postgres.java-tasks.svc.cluster.local"
      - op: replace
        path: /data/RABBITMQ_HOST
        value: "rabbitmq.java-tasks.svc.cluster.local"
      - op: replace
        path: /data/REDIS_HOST
        value: "redis.java-tasks.svc.cluster.local"
  - target:
      kind: ConfigMap
      name: activity-service-config
    patch: |
      - op: replace
        path: /data/MONGODB_HOST
        value: "mongodb.java-tasks.svc.cluster.local"
      - op: replace
        path: /data/RABBITMQ_HOST
        value: "rabbitmq.java-tasks.svc.cluster.local"
  - target:
      kind: ConfigMap
      name: notification-service-config
    patch: |
      - op: replace
        path: /data/REDIS_HOST
        value: "redis.java-tasks.svc.cluster.local"
      - op: replace
        path: /data/RABBITMQ_HOST
        value: "rabbitmq.java-tasks.svc.cluster.local"
  # --- Ingress: QA host ---
  - target:
      kind: Ingress
      name: java-tasks-ingress
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: "qa-api.kylebradshaw.dev"
  # --- Remove infrastructure deployments (shared with prod) ---
  - target:
      kind: Deployment
      name: postgres
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: postgres
  - target:
      kind: Deployment
      name: mongodb
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mongodb
  - target:
      kind: Deployment
      name: redis
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redis
  - target:
      kind: Deployment
      name: rabbitmq
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rabbitmq
  # postgres-replica is shared with prod (the replica streams the entire
  # primary, including QA databases); delete the StatefulSet here and
  # ExternalName the Service back at the prod replica below.
  - target:
      kind: StatefulSet
      name: postgres-replica
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres-replica
  # --- Gateway service: ClusterIP in QA (prod holds cluster-wide NodePort 30080) ---
  - target:
      kind: Service
      name: gateway-service
    patch: |
      - op: replace
        path: /spec
        value:
          type: ClusterIP
          selector:
            app: gateway-service
          ports:
            - port: 8080
              targetPort: 8080
  # --- Replace infrastructure services with ExternalName ---
  - target:
      kind: Service
      name: postgres
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: postgres.java-tasks.svc.cluster.local
  - target:
      kind: Service
      name: mongodb
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: mongodb.java-tasks.svc.cluster.local
  - target:
      kind: Service
      name: redis
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: redis.java-tasks.svc.cluster.local
  - target:
      kind: Service
      name: rabbitmq
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: rabbitmq.java-tasks.svc.cluster.local
  - target:
      kind: Service
      name: postgres-replica
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: postgres-replica.java-tasks.svc.cluster.local
  - target:
      kind: Service
      name: pgbouncer
    patch: |
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: pgbouncer.java-tasks.svc.cluster.local
  # --- Remove pgbouncer deployment + bootstrap job (shared with prod) ---
  - target:
      kind: Deployment
      name: pgbouncer
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pgbouncer
  - target:
      kind: Job
      name: pgbouncer-auth-bootstrap
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: pgbouncer-auth-bootstrap
  - target:
      kind: PodDisruptionBudget
      name: pgbouncer-pdb
    patch: |
      $patch: delete
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: pgbouncer-pdb
  # --- Remove PVC (no local storage needed) ---
  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-pvc
  # --- Remove rabbitmq ingress (not needed for QA) ---
  - target:
      kind: Ingress
      name: rabbitmq-ingress
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: rabbitmq-ingress
  # --- Remove WAL-archive workloads (shared prod handles them) ---
  - target:
      kind: CronJob
      name: postgres-basebackup
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: postgres-basebackup
  - target:
      kind: Job
      name: postgres-replicator-bootstrap
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: postgres-replicator-bootstrap
  # postgres-grafana-reader and postgres-extensions-bootstrap mirror
  # pgbouncer-auth-bootstrap and postgres-replicator-bootstrap above:
  # they create global roles or extensions in the SHARED prod postgres
  # (java-tasks namespace, reached from QA via ExternalName). Letting
  # them run from the QA overlay re-CREATEs/ALTERs prod-side state with
  # whatever passwords live in java-tasks-qa/java-secrets, silently
  # overwriting the prod role passwords on every QA deploy. Prod is the
  # single source of truth for these bootstrap operations.
  - target:
      kind: Job
      name: postgres-grafana-reader
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: postgres-grafana-reader
  - target:
      kind: Job
      name: postgres-extensions-bootstrap
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: postgres-extensions-bootstrap
  # --- Remove WAL-archive PVCs (the underlying PVs are claimed by prod) ---
  # Without these deletes, QA's PVCs raced prod's for the only two matching PVs
  # and cross-bound, leaving prod's postgres pod unschedulable.
  # See incident note in docs/runbooks/postgres-recovery.md.
  - target:
      kind: PersistentVolumeClaim
      name: postgres-wal-archive
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-wal-archive
  - target:
      kind: PersistentVolumeClaim
      name: postgres-basebackup
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-basebackup
  - target:
      kind: PersistentVolumeClaim
      name: postgres-backup
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-backup
  - target:
      kind: PersistentVolumeClaim
      name: postgres-backup-readonly
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-backup-readonly
