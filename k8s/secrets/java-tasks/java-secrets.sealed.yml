---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: java-secrets
  namespace: java-tasks
spec:
  encryptedData:
    google-client-id: 
    google-client-secret: 
    grafana-reader-password: 
    jwt-secret: 
    pgbouncer-auth-password: 
    postgres-password: 
    replicator-password: 
  template:
    metadata:
      annotations:
        # Allow the controller to adopt the existing live Secret that
        # was created out-of-band, before the Sealed Secrets migration.
        # Without this annotation on the materialized Secret, the
        # controller errors with `already exists and is not managed`
        # and never reconciles. The same annotation is added to the
        # cluster's live Secret in Phase 3; the template here keeps it
        # in place across future re-creations.
        sealedsecrets.bitnami.com/managed: "true"
      name: java-secrets
      namespace: java-tasks
    type: Opaque
