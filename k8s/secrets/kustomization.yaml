apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Top-level kustomization for committed SealedSecret resources.
# Applied by k8s/deploy.sh and the Deploy QA / Deploy Production CI jobs
# AFTER the Sealed Secrets controller in kube-system is Ready.
#
# Each namespace has its own subdirectory + kustomization listing the
# *.sealed.yml files that should land in that namespace. Adding a new
# sealed Secret means: drop the file in the right subdir, append it to
# that subdir's kustomization, and the next deploy picks it up.

resources:
  - java-tasks
  - java-tasks-qa
  - go-ecommerce
  - go-ecommerce-qa
  - monitoring
