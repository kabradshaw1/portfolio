global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "windows"
    static_configs:
      - targets: ["host.docker.internal:9182"]

  - job_name: "nvidia-gpu"
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "qdrant"
    metrics_path: /healthz
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: "ingestion"
    metrics_path: /health
    static_configs:
      - targets: ["ingestion:8000"]

  - job_name: "chat"
    metrics_path: /health
    static_configs:
      - targets: ["chat:8000"]

  - job_name: "grafana"
    metrics_path: /api/health
    static_configs:
      - targets: ["grafana:3000"]
